name: Sync draw.io version metadata

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Lấy thông tin Release và Commit
        id: get_info
        run: |
          LATEST_TAG=$(gh release view --json tagName -q '.tagName' || echo "v0.1")
          RELEASE_DATE=$(gh release view $LATEST_TAG --json publishedAt -q '.publishedAt' | cut -d'T' -f1 || date +%Y-%m-%d)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "TAG=$LATEST_TAG" >> $GITHUB_ENV
          echo "DATE=$RELEASE_DATE" >> $GITHUB_ENV
          echo "SHA=$SHORT_SHA" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cập nhật metadata vào file draw.io
        run: |
          FILE="diagrams/EBTW_CP.drawio"
          if [ -f "$FILE" ]; then
            echo "Đang cập nhật file $FILE..."
            # Dùng sed để thay thế các biến giữ chỗ
            sed -i -e "s/__VERSION__/${{ env.TAG }}/g" \
                   -e "s/__DATE__/${{ env.DATE }}/g" \
                   -e "s/__COMMIT__/${{ env.SHA }}/g" $FILE
          else
            echo "Lỗi: Không tìm thấy file $FILE!"
            exit 1
          fi

      - name: Lưu (Commit) và Đẩy (Push) lên GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add diagrams/EBTW_CP.drawio
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-sync diagram version metadata" && git push)
